<!-- HERO -->

<section class="page-hero">
  <div class="container">
    <!-- <p class="page-hero-tag">// contact.me</p> -->
    <h1>Get in Touch</h1>
    <p>If you have an opportunity or project, feel free to reach out.</p>
  </div>
</section>

<!-- CONTACT SECTION -->

<section class="py-5">
  <div class="container">
    <div class="row g-4">
  <!-- FORM -->
  <div class="col-lg-7">
    <form class="contact-form"
          action="https://formspree.io/f/your-form-id"
          method="POST">

      <div class="mb-3">
        <label>Name</label>
        <input type="text" name="name" class="form-control" required placeholder="Your name">
      </div>

      <div class="mb-3">
        <label>Email</label>
        <input type="email" name="email" class="form-control" required placeholder="your@email.com">
      </div>

      <div class="mb-3">
        <label>Message</label>
        <textarea name="message" rows="5" class="form-control" required placeholder="Write your message..."></textarea>
      </div>

      <button type="submit" class="btn-accent">
        <i class="bi bi-send"></i> Send Message
      </button>

    </form>
  </div>

  <!-- CONTACT INFO -->
  <div class="col-lg-5">
    <div class="contact-info-card">

      <div class="contact-info-item">
        <div class="contact-info-icon"><i class="bi bi-envelope"></i></div>
        <div class="contact-info-text">
          <span>Email</span>
          <a href="mailto:vijaychintal.2525@gmail.com">vijaychintal.2525@gmail.com</a>
        </div>
      </div>

      <div class="contact-info-item">
        <div class="contact-info-icon"><i class="bi bi-geo-alt"></i></div>
        <div class="contact-info-text">
          <span>Location</span>
          <p>Bangalore, India</p>
        </div>
      </div>

      <div class="contact-info-item">
        <div class="contact-info-icon"><i class="bi bi-linkedin"></i></div>
        <div class="contact-info-text">
          <span>LinkedIn</span>
          <a href="https://linkedin.com/in/your-profile" target="_blank">View Profile</a>
        </div>
      </div>

    </div>
  </div>

</div>
  </div>
</section>
